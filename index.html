<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaCheck — AI Startup Idea Validator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <div class="logo">💡 IdeaCheck</div>
      <p class="tagline">Stress-test your startup idea like an investor would</p>
    </header>

    <!-- Intro screen -->
    <div id="intro-screen" class="screen active">
      <div class="intro-card">
        <h1>Got a startup idea?</h1>
        <p>Tell us about it. We'll ask a few questions, then give you an honest scorecard — just like a real investor would.</p>
        <div class="how-it-works">
          <div class="step"><span>1</span>Describe your idea</div>
          <div class="arrow">→</div>
          <div class="step"><span>2</span>Answer quick questions</div>
          <div class="arrow">→</div>
          <div class="step"><span>3</span>Get your scorecard</div>
        </div>
        <button id="start-btn" class="btn-primary">Start Validating →</button>
      </div>
    </div>

    <!-- Chat screen -->
    <div id="chat-screen" class="screen">
      <div class="chat-container">
        <div id="messages" class="messages"></div>
        <div class="input-area">
          <textarea id="user-input" placeholder="Type your message..." rows="2"></textarea>
          <button id="send-btn" class="btn-send">Send</button>
        </div>
      </div>
    </div>

    <!-- Scorecard screen -->
    <div id="score-screen" class="screen">
      <div class="scorecard">
        <h2>📊 Your Idea Scorecard</h2>
        <div id="overall-score" class="overall-score"></div>
        <div id="dimensions" class="dimensions"></div>
        <div id="pivot-section" class="pivot-section"></div>
        <div class="actions">
          <button id="restart-btn" class="btn-secondary">Validate Another Idea</button>
          <button id="copy-btn" class="btn-primary">Copy Report</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Load config (API key) before app logic -->
  <script src="config.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
